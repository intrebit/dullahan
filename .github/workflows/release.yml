name: Release

# Cut a release by pushing a tag, e.g. `git tag v0.3.0 && git push --tags`.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: build + publish dry-run + GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Build release binary
        working-directory: server
        run: cargo build --release --locked --bin dullahan

      # Verifies the crate packages cleanly (catches readme/path/asset issues)
      # without uploading. Real publish stays manual until CARGO_REGISTRY_TOKEN
      # is set as a secret; then add a `cargo publish` step gated on it.
      - name: cargo publish dry-run
        working-directory: server
        run: cargo publish --dry-run --locked

      - name: Package binary
        working-directory: server
        run: |
          install -Dm755 target/release/dullahan "dist/dullahan-${GITHUB_REF_NAME}-x86_64-linux"

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: server/dist/dullahan-*
          generate_release_notes: true
